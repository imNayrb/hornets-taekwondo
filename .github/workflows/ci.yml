name: CI — Hornets Taekwondo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint + Type Check ──────────────────────────────
  backend-check:
    name: Backend — Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true

  # ── Frontend Lint + Build ──────────────────────────────────
  frontend-check:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

  # ── Security Audit ─────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]

    steps:
      - uses: actions/checkout@v4

      - name: Backend npm audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Docker Build Check ─────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: hornets-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: hornets-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.hornets-taekwondo.it/api
